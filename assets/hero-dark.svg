<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="500"
    viewBox="0 0 1600 500">

    <defs>

        <!-- Background Gradient -->

        <linearGradient id="bg"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%" stop-color="#08111F"/>

            <stop offset="50%" stop-color="#102A43"/>

            <stop offset="100%" stop-color="#0F172A"/>

            <animateTransform
                attributeName="gradientTransform"
                type="rotate"
                values="0 .5 .5;360 .5 .5"
                dur="25s"
                repeatCount="indefinite"/>

        </linearGradient>

        <!-- Cyan Glow -->

        <radialGradient id="glow1">

            <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.40"/>

            <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>

        </radialGradient>

        <!-- Blue Glow -->

        <radialGradient id="glow2">

            <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>

            <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>

        </radialGradient>

    </defs>

    <!-- Background -->

    <rect
        width="1600"
        height="500"
        rx="24"
        fill="url(#bg)"/>

    <!-- Left Glow -->

    <circle
        cx="250"
        cy="120"
        r="220"
        fill="url(#glow1)">

        <animate
            attributeName="r"
            values="210;240;210"
            dur="8s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Right Glow -->

    <circle
        cx="1350"
        cy="380"
        r="250"
        fill="url(#glow2)">

        <animate
            attributeName="r"
            values="250;290;250"
            dur="10s"
            repeatCount="indefinite"/>

    </circle>
<!-- ========================= -->
<!-- Glass Terminal Card -->
<!-- ========================= -->

<!-- Card Shadow -->

<rect
    x="1020"
    y="90"
    width="470"
    height="280"
    rx="22"
    fill="#000000"
    opacity="0.18"/>

<!-- Glass Card -->

<rect
    x="1005"
    y="75"
    width="470"
    height="280"
    rx="22"
    fill="#ffffff"
    fill-opacity="0.08"
    stroke="#38BDF8"
    stroke-opacity="0.25"/>

<!-- Terminal Header -->

<rect
    x="1005"
    y="75"
    width="470"
    height="45"
    rx="22"
    fill="#0F172A"/>

<!-- Header Dots -->

<circle cx="1038" cy="97" r="6" fill="#EF4444"/>
<circle cx="1060" cy="97" r="6" fill="#F59E0B"/>
<circle cx="1082" cy="97" r="6" fill="#22C55E"/>

<!-- Terminal Title -->

<text
    x="1125"
    y="103"
    fill="#F8FAFC"
    font-size="18"
    font-family="JetBrains Mono, monospace">

Terminal

</text>

<!-- Terminal Content -->

<text
    x="1040"
    y="160"
    fill="#38BDF8"
    font-size="22"
    font-family="JetBrains Mono, monospace">

$ whoami

</text>

<text
    x="1040"
    y="205"
    fill="#F8FAFC"
    font-size="22"
    font-family="JetBrains Mono, monospace">

K. Avinash

</text>

<text
    x="1040"
    y="245"
    fill="#94A3B8"
    font-size="20"
    font-family="JetBrains Mono, monospace">

AI & Data Science Student

</text>

<text
    x="1040"
    y="285"
    fill="#22D3EE"
    font-size="20"
    font-family="JetBrains Mono, monospace">

Building Intelligent Solutions

</text>

<!-- Blinking Cursor -->

<rect
    x="1345"
    y="271"
    width="10"
    height="24"
    fill="#22D3EE">

    <animate
        attributeName="opacity"
        values="1;0;1"
        dur="1s"
        repeatCount="indefinite"/>

</rect>
</svg>
