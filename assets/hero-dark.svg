<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="1600"
    height="500"
    viewBox="0 0 1600 500"
    fill="none">

<!-- ===================================================== -->
<!--                 DEFINITIONS                            -->
<!-- ===================================================== -->

<defs>

    <!-- ============================================== -->
    <!-- Background Gradient                            -->
    <!-- ============================================== -->

    <linearGradient
        id="backgroundGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%">

        <stop
            offset="0%"
            stop-color="#07111F"/>

        <stop
            offset="35%"
            stop-color="#0F1F38"/>

        <stop
            offset="70%"
            stop-color="#102A43"/>

        <stop
            offset="100%"
            stop-color="#0B172A"/>

    </linearGradient>

    <!-- ============================================== -->
    <!-- Cyan Glow                                     -->
    <!-- ============================================== -->

    <radialGradient id="cyanGlow">

        <stop
            offset="0%"
            stop-color="#22D3EE"
            stop-opacity="0.45"/>

        <stop
            offset="100%"
            stop-color="#22D3EE"
            stop-opacity="0"/>

    </radialGradient>

    <!-- ============================================== -->
    <!-- Blue Glow                                     -->
    <!-- ============================================== -->

    <radialGradient id="blueGlow">

        <stop
            offset="0%"
            stop-color="#2563EB"
            stop-opacity="0.35"/>

        <stop
            offset="100%"
            stop-color="#2563EB"
            stop-opacity="0"/>

    </radialGradient>

    <!-- ============================================== -->
    <!-- Glass Card                                     -->
    <!-- ============================================== -->

    <linearGradient
        id="glassGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%">

        <stop
            offset="0%"
            stop-color="#FFFFFF"
            stop-opacity="0.12"/>

        <stop
            offset="100%"
            stop-color="#FFFFFF"
            stop-opacity="0.05"/>

    </linearGradient>

    <!-- ============================================== -->
    <!-- Accent Gradient                                -->
    <!-- ============================================== -->

    <linearGradient
        id="accentGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="0%">

        <stop
            offset="0%"
            stop-color="#38BDF8"/>

        <stop
            offset="100%"
            stop-color="#22D3EE"/>

    </linearGradient>

    <!-- ============================================== -->
    <!-- Soft Shadow                                    -->
    <!-- ============================================== -->

    <filter
        id="shadow"
        x="-20%"
        y="-20%"
        width="140%"
        height="140%">

        <feDropShadow
            dx="0"
            dy="12"
            stdDeviation="18"
            flood-color="#000000"
            flood-opacity="0.35"/>

    </filter>

    <!-- ============================================== -->
    <!-- Glow Filter                                    -->
    <!-- ============================================== -->

    <filter id="glow">

        <feGaussianBlur
            stdDeviation="18"
            result="blur"/>

        <feMerge>

            <feMergeNode in="blur"/>

            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>

</defs>

<!-- ===================================================== -->
<!--                   BACKGROUND                           -->
<!-- ===================================================== -->

<rect
    width="1600"
    height="500"
    rx="26"
    fill="url(#backgroundGradient)"/>

<!-- ===================================================== -->
<!--                   GLOW LAYER                           -->
<!-- ===================================================== -->

<circle
    cx="220"
    cy="110"
    r="240"
    fill="url(#cyanGlow)"
    filter="url(#glow)"/>

<circle
    cx="1430"
    cy="380"
    r="270"
    fill="url(#blueGlow)"
    filter="url(#glow)"/>

<!-- ===================================================== -->
<!-- SECTION 2 STARTS BELOW THIS LINE                      -->
<!-- ===================================================== -->
     <!-- ===================================================== -->
<!--                MAIN CONTENT LAYOUT                    -->
<!-- ===================================================== -->

<!-- Left Content Area Guide -->
<rect
    x="55"
    y="45"
    width="760"
    height="410"
    rx="28"
    fill="url(#glassGradient)"
    opacity="0.04"/>

<!-- Terminal Shadow -->

<rect
    x="955"
    y="60"
    width="565"
    height="345"
    rx="28"
    fill="#000000"
    opacity="0.18"
    filter="url(#shadow)"/>

<!-- Terminal Glass Card -->

<rect
    x="940"
    y="45"
    width="565"
    height="345"
    rx="28"
    fill="url(#glassGradient)"
    stroke="#38BDF8"
    stroke-opacity="0.25"/>

<!-- Terminal Header -->

<rect
    x="940"
    y="45"
    width="565"
    height="52"
    rx="28"
    fill="#111827"/>

<!-- Header Bottom Strip -->

<rect
    x="940"
    y="80"
    width="565"
    height="17"
    fill="#111827"/>

<!-- Mac Buttons -->

<circle
    cx="975"
    cy="71"
    r="6"
    fill="#FF5F57"/>

<circle
    cx="998"
    cy="71"
    r="6"
    fill="#FEBC2E"/>

<circle
    cx="1021"
    cy="71"
    r="6"
    fill="#28C840"/>

<!-- Terminal Title -->

<text
    x="1205"
    y="77"
    fill="#FFFFFF"
    font-size="17"
    font-family="Arial"
    text-anchor="middle">

Terminal

</text>

<!-- Decorative Grid -->

<line
    x1="940"
    y1="97"
    x2="1505"
    y2="97"
    stroke="#38BDF8"
    stroke-opacity="0.08"/>

<!-- Bottom Decoration -->

<line
    x1="60"
    y1="448"
    x2="820"
    y2="448"
    stroke="#38BDF8"
    stroke-opacity="0.10"/>

<!-- Right Decoration -->

<line
    x1="940"
    y1="430"
    x2="1505"
    y2="430"
    stroke="#38BDF8"
    stroke-opacity="0.08"/>

<!-- Floating Accent Circle -->

<circle
    cx="835"
    cy="250"
    r="6"
    fill="#38BDF8"
    opacity="0.35"/>

<circle
    cx="845"
    cy="250"
    r="3"
    fill="#22D3EE"/>

<!-- Small Accent -->

<circle
    cx="905"
    cy="140"
    r="3"
    fill="#38BDF8"
    opacity="0.4"/>

<circle
    cx="900"
    cy="330"
    r="5"
    fill="#22D3EE"
    opacity="0.25"/>

<!-- ===================================================== -->
<!-- SECTION 3 STARTS BELOW THIS LINE                      -->
<!-- ===================================================== -->
     
     
     
